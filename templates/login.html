{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Sign In</h2>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Email or Mobile</label>
                <input type="text" name="identifier" required placeholder="Email or 10-digit mobile" autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Your password">
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
        <p class="auth-link">No account? <a href="{{ url_for('register') }}">Register</a></p>
        {% if locked %}
        <div class="locked-notice">
            <p>🔒 Your account is locked.</p>
            <a href="{{ url_for('contact_admin') }}" class="btn btn-danger" style="width:100%;text-align:center;margin-top:.5rem">Contact Admin</a>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
