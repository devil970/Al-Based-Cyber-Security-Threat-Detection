{% extends 'base.html' %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card admin-card">
        <div class="admin-badge">🔐 Admin Portal</div>
        <h2>Admin Login</h2>
        <p class="admin-subtitle">Restricted access. Authorized personnel only.</p>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required autofocus placeholder="Enter admin username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="pw-wrap">
                    <input type="password" name="password" id="adminPw" required placeholder="Enter password">
                    <span class="pw-toggle" onclick="togglePw()">👁</span>
                </div>
            </div>
            <button type="submit" class="btn btn-danger">Login as Admin</button>
        </form>
        <p class="auth-link"><a href="{{ url_for('login') }}">← Back to User Login</a></p>
    </div>
</div>

<style>
.admin-badge {
    display: inline-block;
    background: #fee2e2;
    color: #7f1d1d;
    font-size: .78rem;
    font-weight: 700;
    padding: .3rem .8rem;
    border-radius: 20px;
    margin-bottom: .75rem;
    letter-spacing: .05em;
}
.admin-subtitle {
    font-size: .85rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
}
.pw-wrap { position: relative; }
.pw-wrap input { padding-right: 2.5rem; }
.pw-toggle {
    position: absolute;
    right: .75rem;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 1rem;
    user-select: none;
}
</style>

<script>
function togglePw() {
    const input = document.getElementById('adminPw');
    input.type = input.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
